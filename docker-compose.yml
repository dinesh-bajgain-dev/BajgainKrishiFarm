services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bajgain
      POSTGRES_PASSWORD: bajgain
      POSTGRES_DB: bajgain_farm
    ports:
      - "5432:5432"
    volumes:
      - bajgain_pgdata:/var/lib/postgresql/data

volumes:
  bajgain_pgdata:
